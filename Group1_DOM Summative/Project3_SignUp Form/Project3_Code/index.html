<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Signup Form with ID Card</title>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<header>
			<h1>CodeChum ID Generator</h1>
		</header>
		<main>
			<div class="container">
				<!-- Signup Form -->
				<section class="form-container">
					<h2>Create Your ID</h2>
					<form id="signupForm">
						<label for="fullName">Full Name:</label>
						<input type="text" id="fullName" name="fullName" required />
						<span class="error" id="fullNameError"></span>

						<label for="nickname">Nickname:</label>
						<input type="text" id="nickname" name="nickname" required />
						<span class="error" id="nicknameError"></span>

						<label for="dob">Date of Birth:</label>
						<input type="date" id="dob" name="dob" required />
						<span class="error" id="dobError"></span>

						<label for="address">Address:</label>
						<input type="text" id="address" name="address" required />
						<span class="error" id="addressError"></span>

						<label for="email">Email:</label>
						<input type="email" id="email" name="email" required />
						<span class="error" id="emailError"></span>

						<button type="submit">Sign Up</button>
					</form>
				</section>

				<!-- ID Card Display -->
				<section class="id-card">
					<div class="id-header">
						<img src="../assets/codechum.svg" id="idLogo" alt="Logo" />
						<h2>CodeChum University</h2>
					</div>
					<div class="id-container">
						<img
							src="../assets/profile_picture.png"
							id="idPhoto"
							alt="User Photo"
						/>
						<div class="id-details">
							<p><strong>ID:</strong> <span id="idNumber">####</span></p>
							<p><strong>Name:</strong> <span id="idName">N/A</span></p>
							<p><strong>Nickname:</strong> <span id="idNickname">N/A</span></p>
							<p><strong>Date of Birth:</strong> <span id="idDob">N/A</span></p>
							<p><strong>Address:</strong> <span id="idAddress">N/A</span></p>
							<p><strong>Email:</strong> <span id="idEmail">N/A</span></p>
						</div>
					</div>
				</section>
			</div>
		</main>
		<script src="script.js"></script>
	</body>
</html>
