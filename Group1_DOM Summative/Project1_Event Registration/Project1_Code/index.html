<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Event Registration</title>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<header>
			<h1>Event Registration</h1>
		</header>

		<main>
			<section class="registration-form">
				<h2>Register for the Event</h2>
				<form id="eventForm">
					<label for="fullName">Full Name:</label>
					<input type="text" id="fullName" name="fullName" required />
					<span class="error" id="fullNameError"></span>

					<label for="email">Email:</label>
					<input type="email" id="email" name="email" required />
					<span class="error" id="emailError"></span>

					<label for="eventChoice">Choose an Event:</label>
					<select id="eventChoice" name="eventChoice" required>
						<option value="">Select an event</option>
						<option value="Tech Conference">Tech Conference</option>
						<option value="Business Meetup">Business Meetup</option>
						<option value="Startup Workshop">Startup Workshop</option>
					</select>
					<span class="error" id="eventError"></span>

					<button type="submit" id="registerBtn" disabled>Register</button>
				</form>
			</section>

			<section class="attendee-list">
				<h2>Registered Attendees</h2>
				<label for="filterEvent">Filter by Event:</label>
				<select id="filterEvent">
					<option value="all">All Events</option>
					<option value="Tech Conference">Tech Conference</option>
					<option value="Business Meetup">Business Meetup</option>
					<option value="Startup Workshop">Startup Workshop</option>
				</select>

				<div class="table-container">
					<!-- Scrollable container -->
					<table>
						<thead>
							<tr>
								<th>ID</th>
								<th>Name</th>
								<th>Email</th>
								<th>Event</th>
							</tr>
						</thead>
						<tbody id="attendeeTableBody">
							<tr>
								<td colspan="4">No attendees registered yet.</td>
							</tr>
						</tbody>
					</table>
				</div>
			</section>
		</main>

		<script src="script.js"></script>
	</body>
</html>
