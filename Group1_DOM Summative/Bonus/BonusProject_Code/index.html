<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Book Lending Management</title>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<header>
			<h1>Book Lending Management</h1>
		</header>
		<main>
			<div class="container">
				<!-- Add Book Form -->
				<section class="book-form">
					<h2>Add a New Book</h2>
					<form id="bookForm">
						<label for="bookTitle">Book Title:</label>
						<input type="text" id="bookTitle" name="bookTitle" required />
						<span class="error" id="bookTitleError"></span>

						<label for="author">Author:</label>
						<input type="text" id="author" name="author" required />
						<span class="error" id="authorError"></span>

						<button type="submit" id="addBookButton" disabled>Add Book</button>
					</form>
				</section>

				<!-- Lending Section -->
				<section class="lend-form">
					<h2>Lend a Book</h2>
					<form id="lendForm">
						<label for="lendBook">Select Book:</label>
						<select id="lendBook" name="lendBook">
							<option value="">Select a book</option>
						</select>
						<span class="error" id="lendBookError"></span>

						<label for="borrower">Borrower's Name:</label>
						<input type="text" id="borrower" name="borrower" required />
						<span class="error" id="borrowerError"></span>

						<button type="submit" id="lendBookButton" disabled>
							Lend Book
						</button>
					</form>
				</section>
			</div>

			<!-- Book Records -->
			<section class="records">
				<h2>Book Records</h2>
				<div class="record-card">
					<table id="recordTable">
						<thead>
							<tr>
								<th>Book Title</th>
								<th>Author</th>
								<th>Status</th>
								<th>Borrower</th>
								<th>Action</th>
							</tr>
						</thead>
						<tbody>
							<!-- Book records will be dynamically added here -->
						</tbody>
					</table>
				</div>
			</section>
		</main>
		<script src="script.js"></script>
	</body>
</html>
